# Tommy CI — Auto-assign PR author
# Config lives in .github/tommy.yml — edit that file, not this workflow.

name: PR Assign Author

on:
  pull_request_target:
    types: [opened]

jobs:
  assign-author:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
          sparse-checkout-cone-mode: false

      - name: Load Config
        id: cfg
        run: |
          echo "secret_app_id=$(yq -r '.github.secrets.app_id' .github/tommy.yml)" >> "$GITHUB_OUTPUT"
          echo "secret_private_key=$(yq -r '.github.secrets.private_key' .github/tommy.yml)" >> "$GITHUB_OUTPUT"

      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets[steps.cfg.outputs.secret_app_id] }}
          private-key: ${{ secrets[steps.cfg.outputs.secret_private_key] }}

      - name: Assign author
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const author = context.payload.pull_request.user.login;

            try {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [author]
              });
              console.log(`Assigned @${author} to PR #${context.issue.number}`);
            } catch (error) {
              // External contributors can't be assigned
              console.log(`Could not assign @${author}: ${error.message}`);
            }
