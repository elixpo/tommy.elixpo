# Tommy CI — Project Manager
# Config lives in .github/tommy.yml — edit that file, not this workflow.

name: Project Manager

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

concurrency:
  group: project-manager-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  organize:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
      repository-projects: write
    steps:
      - uses: actions/checkout@v4

      - name: Load Config
        id: cfg
        run: |
          echo "secret_app_id=$(yq -r '.github.secrets.app_id' .github/tommy.yml)" >> "$GITHUB_OUTPUT"
          echo "secret_private_key=$(yq -r '.github.secrets.private_key' .github/tommy.yml)" >> "$GITHUB_OUTPUT"
          echo "secret_ai_token=$(yq -r '.github.secrets.ai_token' .github/tommy.yml)" >> "$GITHUB_OUTPUT"
          APP_OWNER=$(yq -r '.github.app_token_owner' .github/tommy.yml)
          if [ "$APP_OWNER" = "" ] || [ "$APP_OWNER" = "null" ]; then
            echo "app_token_owner=" >> "$GITHUB_OUTPUT"
          else
            echo "app_token_owner=$APP_OWNER" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets[steps.cfg.outputs.secret_app_id] }}
          private-key: ${{ secrets[steps.cfg.outputs.secret_private_key] }}
          owner: ${{ steps.cfg.outputs.app_token_owner || github.repository_owner }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Organize issue or PR
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_EVENT: ${{ toJSON(github.event) }}
          POLLINATIONS_TOKEN: ${{ secrets[steps.cfg.outputs.secret_ai_token] }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python .github/scripts/project-manager.py
